<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HudBroker — Trading</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&family=Raleway:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
<link rel="stylesheet" href="/css/shared.css">
<style>
html, body { height: 100%; overflow: hidden; }
.trade-shell { display: flex; flex-direction: column; height: 100vh; }
.trade-topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 16px; height: 56px; border-bottom: 1px solid var(--border);
  background: var(--bg-panel); flex-shrink: 0;
}
.asset-pill {
  display: flex; align-items: center; gap: 8px; background: var(--bg-elevated);
  border: 1px solid var(--border); border-radius: 8px; padding: 6px 12px; cursor: pointer;
}
.asset-pill .icon { width: 22px; height: 22px; border-radius: 50%; background: var(--brand); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: #1a1208; }
.asset-pill .name { font-weight: 600; font-size: 13px; }
.asset-pill .sub { font-size: 11px; color: var(--text-faint); }
.asset-dropdown { display: none; position: absolute; top: 56px; left: 16px; background: var(--bg-panel); border: 1px solid var(--border); border-radius: 10px; padding: 6px; z-index: 50; min-width: 200px; }
.asset-dropdown.open { display: block; }
.asset-option { padding: 10px 12px; border-radius: 8px; cursor: pointer; font-size: 13px; font-family: var(--font-mono); }
.asset-option:hover { background: var(--bg-elevated); }

.trade-body { flex: 1; display: flex; min-height: 0; }
#tv_chart { flex: 1; min-width: 0; }

.trade-panel {
  width: 280px; flex-shrink: 0; background: var(--bg-panel);
  border-left: 1px solid var(--border); padding: 16px; display: flex; flex-direction: column; gap: 16px;
  overflow-y: auto;
}
.panel-block { background: var(--bg-elevated); border-radius: 10px; padding: 12px; overflow: hidden; }
.panel-label-row { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-dim); margin-bottom: 10px; }
.panel-label-row i { font-size: 16px; color: var(--text-faint); }
.stepper-value-row {
  font-family: 'Raleway', sans-serif; font-size: 20px; color: #FFFFFFCC;
  display: flex; align-items: center; justify-content: center; gap: 4px; padding: 4px 0 10px;
}
.stepper-btn-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.stepper-btn {
  flex: 1; max-width: 110px; height: 34.5px; border-radius: 8px; border: none;
  background: #00000033; color: #FFFFFFB3; font-family: 'Raleway', sans-serif;
  font-size: 26px; cursor: pointer; display: flex; align-items: center; justify-content: center;
}
.stepper-btn:hover { background: #00000055; }
.countdown-bar { height: 4px; background: var(--border); border-radius: 2px; margin-top: 10px; overflow: hidden; }
.countdown-fill { height: 100%; background: var(--up); width: 100%; transition: width 1s linear; border-radius: 2px; }
.profit-block { width: 220.02px; min-height: 71.69px; margin: 10px auto; padding: 10px; border: 2px solid var(--border); border-radius: 8px; text-align: center; }
.profit-row { display: flex; align-items: baseline; justify-content: center; gap: 8px; }
.profit-label { font-size: 13px; color: var(--text-dim); }
.profit-pct { font-family: Arial, sans-serif; font-size: 16px; font-weight: 700; color: #08B774; }
.profit-amount { font-family: Arial, sans-serif; color: #08B774; font-size: 26px; font-weight: 700; margin-top: 4px; }
.buy-btn, .sell-btn {
  width: 100%; height: 71px; padding: 15px 10px; border-radius: 10px; border: none;
  font-weight: 700; font-size: 16px; cursor: pointer;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px;
}
.buy-btn { background: #08B774; color: #ffffff; margin: 0 0 5px; }
.buy-btn:hover { background: #0acf82; }
.sell-btn { background: #F92757; color: #ffffff; }
.sell-btn:hover { background: #ff3f6b; }
.buy-btn i, .sell-btn i { font-size: 20px; }
.live-clock { text-align: center; font-size: 12px; color: var(--text-faint); font-family: var(--font-mono); }
.open-trades-strip { padding: 8px 16px; border-top: 1px solid var(--border); background: var(--bg-panel); max-height: 100px; overflow-y: auto; flex-shrink: 0; }
.trade-chip { display: inline-flex; align-items: center; gap: 8px; background: var(--bg-elevated); border-radius: 8px; padding: 6px 10px; margin: 4px 4px 0 0; font-size: 12px; font-family: var(--font-mono); }

.account-pill { display: flex; align-items: center; gap: 6px; cursor: pointer; position: relative; height: 36px; }
.account-pill .label { font-size: 11px; color: var(--text-faint); display: block; line-height: 1.2; }
.account-pill .value { font-size: 18px; font-weight: 700; color: #08B774; font-family: var(--font-display); display: block; line-height: 1.2; }
.account-pill .value.demo { color: var(--brand); }
.account-pill i { font-size: 14px; color: var(--text-faint); }
.account-dropdown { display: none; position: absolute; top: 44px; right: 0; background: var(--bg-panel); border: 1px solid var(--border); border-radius: 10px; padding: 6px; z-index: 60; min-width: 200px; }
.account-dropdown.open { display: block; }
.account-option { padding: 10px 12px; border-radius: 8px; cursor: pointer; font-size: 13px; display: flex; justify-content: space-between; }
.account-option:hover { background: var(--bg-elevated); }
.account-option.active { color: var(--brand); }

.btn-deposit {
  font-family: 'Raleway', var(--font-body); font-size: 16px; font-weight: 600;
  background: transparent; color: #08B774; border: 1px solid #08B774;
  border-radius: 8px; padding: 0 15px; height: 36px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.btn-deposit:hover { background: rgba(8,183,116,0.1); }

.avatar-btn { width: 36px; height: 36px; border-radius: 50%; background: var(--bg-elevated); display: flex; align-items: center; justify-content: center; cursor: pointer; overflow: hidden; border: 1px solid var(--border); }
.avatar-btn img { width: 100%; height: 100%; object-fit: cover; }
.avatar-btn i { font-size: 18px; color: var(--text-faint); }

.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; z-index: 100; }
.modal-overlay.open { display: flex; }
.modal-box { width: 380px; background: var(--bg-panel); border-radius: 10px; overflow: hidden; }
.modal-title { background: var(--text-faint); color: var(--bg); font-weight: 600; padding: 12px 18px; font-size: 14px; }
.modal-body { padding: 20px; display: flex; flex-direction: column; gap: 12px; }
</style>
</head>
<body>
<div class="trade-shell">
  <div class="trade-topbar">
    <div style="display:flex; align-items:center; gap:16px; position:relative;">
      <div class="brand"><span class="dot"></span>Hud<span class="tag">Broker</span></div>
      <div class="asset-pill" id="assetPill">
        <div class="icon" id="assetIcon">B</div>
        <div>
          <div class="name" id="assetName">Bitcoin</div>
          <div class="sub">Crypto</div>
        </div>
      </div>
      <div class="asset-dropdown" id="assetDropdown">
        <div class="asset-option" data-asset="BTCUSDT" data-name="Bitcoin" data-icon="B">Bitcoin (BTC/USDT)</div>
        <div class="asset-option" data-asset="ETHUSDT" data-name="Ethereum" data-icon="E">Ethereum (ETH/USDT)</div>
        <div class="asset-option" data-asset="SOLUSDT" data-name="Solana" data-icon="S">Solana (SOL/USDT)</div>
        <div class="asset-option" data-asset="BNBUSDT" data-name="BNB" data-icon="B">BNB (BNB/USDT)</div>
      </div>
    </div>
    <div style="display:flex; align-items:center; gap:16px;">
      <div class="account-pill" id="accountPill">
        <div>
          <span class="label" id="accountLabel">Conta Principal</span>
          <span class="value" id="balanceDisplay">--</span>
        </div>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#FFFFFF82" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="flex-shrink:0;">
          <polyline points="7 9 12 4 17 9"></polyline>
          <polyline points="7 15 12 20 17 15"></polyline>
        </svg>
      </div>
      <div class="account-dropdown" id="accountDropdown">
        <div class="account-option active" data-account="real">Conta Principal <i class="ti ti-check" aria-hidden="true" style="display:none;"></i></div>
        <div class="account-option" data-account="demo">Conta Demo</div>
      </div>

      <div class="avatar-btn" id="avatarBtn"><i class="ti ti-user" aria-hidden="true"></i></div>

      <button class="btn-deposit" id="depositBtn">Depositar</button>
    </div>
  </div>

  <div class="trade-body">
    <div id="tv_chart"></div>

    <div class="trade-panel">
      <div>
        <div class="panel-label-row"><i class="ti ti-clock" aria-hidden="true"></i> Tempo restante: <span style="margin-left:auto; color:var(--up); font-weight:600;" id="countdownLabel">01:00</span></div>
        <div class="panel-block">
          <div class="stepper-value-row" id="durValue">1 min.</div>
          <div class="stepper-btn-row">
            <button class="stepper-btn" id="durMinus">−</button>
            <button class="stepper-btn" id="durPlus">+</button>
          </div>
          <div class="countdown-bar"><div class="countdown-fill" id="countdownFill"></div></div>
        </div>
      </div>

      <div>
        <div class="panel-block">
          <div class="stepper-value-row"><i class="fa fa-dollar" aria-hidden="true" style="font-size:16px;"></i><span id="stakeValue">5,00</span></div>
          <div class="stepper-btn-row">
            <button class="stepper-btn" id="stakeMinus">−</button>
            <button class="stepper-btn" id="stakePlus">+</button>
          </div>
        </div>
      </div>

      <div class="profit-block">
        <div class="profit-row">
          <span class="profit-label">Lucro</span>
          <span class="profit-pct">85%</span>
        </div>
        <div class="profit-amount" id="profitAmount">+R$ 4,25</div>
      </div>

      <button class="buy-btn" id="buyBtn"><i class="ti ti-trending-up" aria-hidden="true"></i> COMPRAR</button>
      <button class="sell-btn" id="sellBtn"><i class="ti ti-trending-down" aria-hidden="true"></i> VENDER</button>

      <div class="live-clock" id="liveClock">Hora atual: --:--:--</div>
    </div>
  </div>

  <div class="open-trades-strip" id="openTradesStrip">
    <span style="font-size:12px; color:var(--text-faint);">Nenhuma operação em andamento</span>
  </div>
</div>

<div class="modal-overlay" id="depositModal">
  <div class="modal-box">
    <div class="modal-title">Depósito Virtual</div>
    <div class="modal-body">
      <select id="depositAccountSelect" disabled style="background: var(--bg-elevated); color: var(--text-dim); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px;">
        <option>Conta Demo</option>
      </select>
      <input type="number" id="depositAmountInput" placeholder="0,00" min="1" value="500">
      <button class="btn btn-primary" id="depositConfirmBtn">Finalizar</button>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="https://s3.tradingview.com/tv.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.47.0/iconfont/tabler-icons.min.css"></script>
<script>
requireAuth();

let currentAsset = 'BTCUSDT';
let stakeValue = 5;
let durationSeconds = 60;
let livePrices = {};

const durationOptions = [
  { sec: 30, label: '30 seg.' },
  { sec: 60, label: '1 min.' },
  { sec: 300, label: '5 min.' },
  { sec: 900, label: '15 min.' }
];
let durationIndex = 1;

function loadChart(symbol) {
  document.getElementById('tv_chart').innerHTML = '';
  new TradingView.widget({
    container_id: 'tv_chart',
    autosize: true,
    symbol: `BINANCE:${symbol}`,
    interval: '1',
    timezone: 'America/Sao_Paulo',
    theme: 'dark',
    style: '1',
    locale: 'br',
    toolbar_bg: '#131720',
    enable_publishing: false,
    hide_top_toolbar: false,
    hide_side_toolbar: false,
    hide_legend: false,
    save_image: false,
    withdateranges: true,
    studies: ['MASimple@tv-basicstudies']
  });
}

document.getElementById('assetPill').onclick = () => {
  document.getElementById('assetDropdown').classList.toggle('open');
};
document.querySelectorAll('.asset-option').forEach(opt => {
  opt.onclick = () => {
    currentAsset = opt.dataset.asset;
    document.getElementById('assetName').textContent = opt.dataset.name;
    document.getElementById('assetIcon').textContent = opt.dataset.icon;
    document.getElementById('assetDropdown').classList.remove('open');
    loadChart(currentAsset);
    updateProfitAmount();
  };
});

function updateDurationDisplay() {
  document.getElementById('durValue').textContent = durationOptions[durationIndex].label;
  durationSeconds = durationOptions[durationIndex].sec;
}

function formatCountdown(totalSeconds) {
  const m = Math.floor(totalSeconds / 60).toString().padStart(2, '0');
  const s = Math.floor(totalSeconds % 60).toString().padStart(2, '0');
  return `${m}:${s}`;
}

// Calcula quanto tempo falta até o próximo "fechamento de vela" alinhado ao relógio.
// Ex: duração 60s -> conta até o próximo minuto cheio (14:32:45 -> faltam 15s para 14:33:00).
// Duração 300s (5min) -> próximo múltiplo de 5 minutos. Duração 900s (15min) -> próximo múltiplo de 15min.
function secondsUntilNextCandleClose(durationSec) {
  const now = new Date();
  const epochSeconds = Math.floor(now.getTime() / 1000);
  const elapsedInCycle = epochSeconds % durationSec;
  const remaining = durationSec - elapsedInCycle;
  return remaining === durationSec ? durationSec : remaining;
}

function updateLiveCountdown() {
  const remaining = secondsUntilNextCandleClose(durationSeconds);
  document.getElementById('countdownLabel').textContent = formatCountdown(remaining);
  document.getElementById('countdownFill').style.width = ((remaining / durationSeconds) * 100) + '%';
}
document.getElementById('durMinus').onclick = () => { if (durationIndex > 0) { durationIndex--; updateDurationDisplay(); } };
document.getElementById('durPlus').onclick = () => { if (durationIndex < durationOptions.length - 1) { durationIndex++; updateDurationDisplay(); } };

function updateStakeDisplay() {
  document.getElementById('stakeValue').textContent = stakeValue.toFixed(2).replace('.', ',');
  updateProfitAmount();
}
function updateProfitAmount() {
  document.getElementById('profitAmount').textContent = '+' + formatMoney(stakeValue * 0.85);
}
document.getElementById('stakeMinus').onclick = () => { if (stakeValue > 1) { stakeValue = Math.max(1, stakeValue - 1); updateStakeDisplay(); } };
document.getElementById('stakePlus').onclick = () => { stakeValue += 1; updateStakeDisplay(); };

function connectPriceFeed() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  const ws = new WebSocket(`${proto}://${location.host}/ws/prices`);
  ws.onmessage = (event) => {
    const msg = JSON.parse(event.data);
    if (msg.type === 'snapshot') livePrices = msg.prices;
    else if (msg.type === 'price') livePrices[msg.symbol] = { price: msg.price, timestamp: msg.timestamp };
  };
  ws.onclose = () => setTimeout(connectPriceFeed, 2000);
}

// Conta ativa: 'real' (Conta Principal) ou 'demo' (Conta Demo). Persiste durante a sessão.
let activeAccount = localStorage.getItem('hb_active_account') || 'demo';
let cachedUser = null;

function setActiveAccount(type) {
  activeAccount = type;
  localStorage.setItem('hb_active_account', type);
  document.getElementById('accountLabel').textContent = type === 'real' ? 'Conta Principal' : 'Conta Demo';
  document.querySelectorAll('.account-option').forEach(o => o.classList.toggle('active', o.dataset.account === type));
  renderBalance();
  refreshOpenTrades();
}

function renderBalance() {
  if (!cachedUser) return;
  const value = activeAccount === 'real' ? cachedUser.balance : cachedUser.demo_balance;
  const el = document.getElementById('balanceDisplay');
  el.textContent = formatMoney(value);
  el.classList.toggle('demo', activeAccount === 'demo');
}

document.getElementById('accountPill').onclick = () => {
  document.getElementById('accountDropdown').classList.toggle('open');
};
document.querySelectorAll('.account-option').forEach(opt => {
  opt.onclick = () => {
    setActiveAccount(opt.dataset.account);
    document.getElementById('accountDropdown').classList.remove('open');
  };
});

async function refreshBalance() {
  try {
    cachedUser = await apiFetch('/trading/me');
    renderBalance();
  } catch (err) {}
}

async function refreshOpenTrades() {
  const trades = await apiFetch('/trading/trades/open?accountType=' + activeAccount);
  const strip = document.getElementById('openTradesStrip');
  if (trades.length === 0) {
    strip.innerHTML = '<span style="font-size:12px; color:var(--text-faint);">Nenhuma operação em andamento</span>';
    return;
  }
  strip.innerHTML = trades.map(t => `
    <span class="trade-chip">
      ${t.asset} <span style="color:${t.direction === 'up' ? 'var(--up)' : 'var(--down)'}">${t.direction === 'up' ? '↑' : '↓'}</span>
      ${formatMoney(t.stake)} <span class="countdown" data-expires="${t.expires_at}">--</span>
    </span>
  `).join('');
}

setInterval(() => {
  updateLiveCountdown();
  document.querySelectorAll('.countdown').forEach(el => {
    const diff = Math.max(0, Math.floor((new Date(el.dataset.expires) - new Date()) / 1000));
    el.textContent = diff > 0 ? `${diff}s` : '...';
    if (diff === 0) setTimeout(() => { refreshOpenTrades(); refreshBalance(); }, 1500);
  });
  const now = new Date();
  document.getElementById('liveClock').textContent = 'Hora atual: ' + now.toLocaleTimeString('pt-BR');
}, 1000);

async function openTrade(direction) {
  try {
    const syncedDuration = secondsUntilNextCandleClose(durationSeconds);
    await apiFetch('/trading/trades', {
      method: 'POST',
      body: JSON.stringify({
        asset: currentAsset,
        direction,
        stake: stakeValue,
        durationSeconds: syncedDuration,
        payoutPct: 0.85,
        accountType: activeAccount
      })
    });
    showToast('Operação aberta com sucesso');
    refreshBalance();
    refreshOpenTrades();
  } catch (err) {
    showToast(err.message, 'error');
  }
}

document.getElementById('buyBtn').onclick = () => openTrade('up');
document.getElementById('sellBtn').onclick = () => openTrade('down');

// Botão Depositar: se a conta ativa é demo, abre o modal de depósito virtual.
// Se for a conta principal, abre o fluxo de depósito real (placeholder neste modo demo/sandbox).
document.getElementById('depositBtn').onclick = () => {
  if (activeAccount === 'demo') {
    document.getElementById('depositModal').classList.add('open');
  } else {
    const amount = prompt('Valor do depósito na Conta Principal (R$):', '500');
    if (!amount) return;
    apiFetch('/trading/deposit', { method: 'POST', body: JSON.stringify({ amount: Number(amount) }) })
      .then(() => { showToast('Depósito realizado'); refreshBalance(); })
      .catch(err => showToast(err.message, 'error'));
  }
};

document.getElementById('depositConfirmBtn').onclick = async () => {
  const amount = Number(document.getElementById('depositAmountInput').value);
  if (!amount || amount <= 0) return showToast('Informe um valor válido', 'error');
  try {
    await apiFetch('/trading/deposit-demo', { method: 'POST', body: JSON.stringify({ amount }) });
    showToast('Depósito virtual realizado');
    document.getElementById('depositModal').classList.remove('open');
    refreshBalance();
  } catch (err) {
    showToast(err.message, 'error');
  }
};
document.getElementById('depositModal').onclick = (e) => {
  if (e.target.id === 'depositModal') e.target.classList.remove('open');
};

document.getElementById('avatarBtn').onclick = () => window.location.href = '/client/account.html';

updateDurationDisplay();
updateStakeDisplay();
updateLiveCountdown();
loadChart(currentAsset);
connectPriceFeed();
setActiveAccount(activeAccount);
refreshBalance().then(renderBalance);
refreshOpenTrades();
setInterval(refreshOpenTrades, 5000);
setInterval(refreshBalance, 8000);
</script>
</body>
</html>
