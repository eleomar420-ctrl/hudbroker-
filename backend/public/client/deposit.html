<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>HudBroker — Depositar via PIX</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/shared.css">
<style>
.deposit-shell {
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh; padding: 16px; background: var(--bg);
}
.deposit-card {
  width: 100%; max-width: 420px; background: var(--bg-panel);
  border: 1px solid var(--border); border-radius: 14px; padding: 28px;
}
.deposit-card h1 {
  font-family: var(--font-display); font-size: 20px; margin-bottom: 4px;
}
.deposit-card .sub {
  color: var(--text-faint); font-size: 13px; margin-bottom: 24px;
}
.pix-logo {
  display: flex; align-items: center; gap: 8px; margin-bottom: 20px;
  font-weight: 600; font-size: 15px; color: #32BCAD;
}
.pix-logo svg { flex-shrink: 0; }

/* Etapa 1: Valor */
.amount-row {
  display: flex; gap: 10px; align-items: flex-end;
}
.amount-row .field { flex: 1; margin-bottom: 0; }
.amount-presets {
  display: flex; gap: 6px; margin-top: 12px; flex-wrap: wrap;
}
.amount-presets button {
  background: var(--bg-elevated); border: 1px solid var(--border);
  color: var(--text); border-radius: 8px; padding: 8px 14px;
  font-size: 13px; cursor: pointer; font-family: var(--font-mono);
  transition: border-color 0.15s;
}
.amount-presets button:hover { border-color: var(--brand); color: var(--brand); }

/* Etapa 2: QR Code */
.qr-section { display: none; text-align: center; }
.qr-section.active { display: block; }
.qr-image {
  width: 220px; height: 220px; margin: 16px auto;
  background: #fff; border-radius: 12px; padding: 12px;
  display: flex; align-items: center; justify-content: center;
}
.qr-image img { width: 100%; height: 100%; object-fit: contain; }

.copy-box {
  background: var(--bg-elevated); border: 1px solid var(--border);
  border-radius: 8px; padding: 12px; margin-top: 14px;
  display: flex; gap: 8px; align-items: center;
}
.copy-box input {
  flex: 1; background: transparent; border: none; color: var(--text);
  font-family: var(--font-mono); font-size: 11px; outline: none;
}
.copy-box button {
  background: var(--brand); color: #1a1208; border: none; border-radius: 6px;
  padding: 8px 14px; font-weight: 600; font-size: 12px; cursor: pointer;
  white-space: nowrap;
}

.status-badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600;
  margin-top: 16px;
}
.status-badge.pending { background: var(--brand-dim); color: var(--brand); }
.status-badge.paid { background: var(--up-dim); color: var(--up); }
.status-badge .spinner {
  width: 14px; height: 14px; border: 2px solid currentColor;
  border-top-color: transparent; border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.timer-text {
  color: var(--text-faint); font-size: 12px; margin-top: 10px;
  font-family: var(--font-mono);
}

.back-link {
  display: inline-block; margin-top: 20px; color: var(--text-faint);
  font-size: 13px; cursor: pointer;
}
.back-link:hover { color: var(--text); }
</style>
</head>
<body>

<div class="deposit-shell">
  <div class="deposit-card">
    <div class="brand" style="margin-bottom: 20px;">
      <span class="dot"></span>Hud<span class="tag">Broker</span>
    </div>

    <!-- Etapa 1: Informar valor -->
    <div id="step1">
      <h1>Depositar via PIX</h1>
      <div class="sub">Depósito instantâneo na sua Conta Principal</div>

      <div class="pix-logo">
        <svg width="24" height="24" viewBox="0 0 512 512" fill="#32BCAD">
          <path d="M389.2 233.5l-91.4-91.4c-15.6-15.6-40.9-15.6-56.6 0l-91.4 91.4c-15.6 15.6-15.6 40.9 0 56.6l91.4 91.4c15.6 15.6 40.9 15.6 56.6 0l91.4-91.4c15.6-15.6 15.6-40.9 0-56.6z"/>
        </svg>
        PIX — Pagamento instantâneo
      </div>

      <div class="field">
        <label>Valor do depósito (R$)</label>
        <input type="number" id="depositAmount" min="1" step="0.01" placeholder="0,00" style="font-size:18px; font-weight:600;">
      </div>

      <div class="amount-presets">
        <button onclick="setAmount(25)">R$ 25</button>
        <button onclick="setAmount(50)">R$ 50</button>
        <button onclick="setAmount(100)">R$ 100</button>
        <button onclick="setAmount(200)">R$ 200</button>
        <button onclick="setAmount(500)">R$ 500</button>
        <button onclick="setAmount(1000)">R$ 1.000</button>
      </div>

      <button class="btn btn-primary" style="width:100%; padding:14px; margin-top:20px; font-size:15px;" id="generateBtn" onclick="generatePix()">
        Gerar PIX
      </button>

      <a class="back-link" href="/client/index.html">← Voltar ao trading</a>
    </div>

    <!-- Etapa 2: QR Code -->
    <div id="step2" class="qr-section">
      <h1>Escaneie o QR Code</h1>
      <div class="sub">Ou copie o código PIX abaixo</div>

      <div class="qr-image" id="qrContainer">
        <img id="qrImg" src="" alt="QR Code PIX">
      </div>

      <div class="copy-box">
        <input type="text" id="pixCode" readonly>
        <button onclick="copyPix()">Copiar</button>
      </div>

      <div>
        <div class="status-badge pending" id="statusBadge">
          <div class="spinner"></div>
          <span id="statusText">Aguardando pagamento...</span>
        </div>
      </div>

      <div class="timer-text" id="timerText">Expira em 60:00</div>

      <p style="color:var(--text-faint); font-size:12px; margin-top:14px;">
        Após o pagamento, seu saldo será creditado automaticamente.
      </p>

      <button class="btn" style="width:100%; margin-top:16px;" onclick="newDeposit()">
        Fazer outro depósito
      </button>

      <a class="back-link" href="/client/index.html">← Voltar ao trading</a>
    </div>

  </div>
</div>

<script src="/js/api.js"></script>
<script>
requireAuth();

let currentTxid = null;
let pollInterval = null;
let expirationTimer = null;
let expiresAt = null;

function setAmount(val) {
  document.getElementById('depositAmount').value = val;
}

async function generatePix() {
  const amount = Number(document.getElementById('depositAmount').value);
  if (!amount || amount < 1) {
    showToast('Informe um valor mínimo de R$ 1,00', 'error');
    return;
  }

  const btn = document.getElementById('generateBtn');
  btn.textContent = 'Gerando...';
  btn.disabled = true;

  try {
    const data = await apiFetch('/pix/charge', {
      method: 'POST',
      body: JSON.stringify({ amount })
    });

    currentTxid = data.txid;

    // Exibir QR Code
    document.getElementById('qrImg').src = data.qrcode;
    document.getElementById('pixCode').value = data.copiaecola;

    // Mostrar etapa 2
    document.getElementById('step1').style.display = 'none';
    document.getElementById('step2').classList.add('active');

    // Timer de expiração
    expiresAt = Date.now() + (data.expiracao * 1000);
    startExpirationTimer();

    // Polling para verificar pagamento
    startPolling();

  } catch (err) {
    showToast(err.message || 'Erro ao gerar PIX', 'error');
  } finally {
    btn.textContent = 'Gerar PIX';
    btn.disabled = false;
  }
}

function startPolling() {
  if (pollInterval) clearInterval(pollInterval);
  pollInterval = setInterval(async () => {
    try {
      const charge = await apiFetch(`/pix/charge/${currentTxid}`);
      if (charge.status === 'paid') {
        clearInterval(pollInterval);
        clearInterval(expirationTimer);
        document.getElementById('statusBadge').className = 'status-badge paid';
        document.getElementById('statusBadge').innerHTML = '<span>✓</span><span>Pagamento confirmado!</span>';
        document.getElementById('timerText').textContent = 'Saldo creditado com sucesso';
        showToast('Depósito confirmado!', 'success');
      }
    } catch (e) { }
  }, 3000); // checa a cada 3 segundos
}

function startExpirationTimer() {
  if (expirationTimer) clearInterval(expirationTimer);
  expirationTimer = setInterval(() => {
    const remaining = Math.max(0, Math.floor((expiresAt - Date.now()) / 1000));
    const m = Math.floor(remaining / 60).toString().padStart(2, '0');
    const s = (remaining % 60).toString().padStart(2, '0');
    document.getElementById('timerText').textContent = `Expira em ${m}:${s}`;
    if (remaining <= 0) {
      clearInterval(expirationTimer);
      clearInterval(pollInterval);
      document.getElementById('timerText').textContent = 'PIX expirado';
      document.getElementById('statusBadge').innerHTML = '<span>✕</span><span>Expirado — gere um novo</span>';
    }
  }, 1000);
}

function copyPix() {
  const code = document.getElementById('pixCode').value;
  navigator.clipboard.writeText(code).then(() => {
    showToast('Código PIX copiado!');
  }).catch(() => {
    // Fallback
    document.getElementById('pixCode').select();
    document.execCommand('copy');
    showToast('Código PIX copiado!');
  });
}

function newDeposit() {
  if (pollInterval) clearInterval(pollInterval);
  if (expirationTimer) clearInterval(expirationTimer);
  currentTxid = null;
  document.getElementById('step2').classList.remove('active');
  document.getElementById('step1').style.display = 'block';
  document.getElementById('depositAmount').value = '';
  document.getElementById('statusBadge').className = 'status-badge pending';
  document.getElementById('statusBadge').innerHTML = '<div class="spinner"></div><span>Aguardando pagamento...</span>';
}
</script>
</body>
</html>
