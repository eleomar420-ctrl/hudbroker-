<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>HudBroker — Entrar</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0c0f1a; color:#fff; font-family:'Inter',sans-serif; min-height:100vh; }

.topbar { display:flex; align-items:center; justify-content:space-between; padding:16px 32px; background:rgba(0,0,0,0.4); }
.topbar-brand { font-family:'Space Grotesk',sans-serif; font-size:24px; font-weight:700; color:#fff; text-decoration:none; }
.topbar-brand span { color:#e8a23d; }
.topbar-nav { display:flex; align-items:center; gap:20px; }
.topbar-btn-enter { color:#fff; text-decoration:none; font-size:14px; font-weight:500; }
.topbar-btn-create { background:#e8a23d; color:#000; padding:8px 20px; border-radius:4px; text-decoration:none; font-size:14px; font-weight:600; }

.login-shell { max-width:500px; margin:60px auto; padding:0 20px; }

.register-row { display:flex; align-items:center; justify-content:space-between; padding:16px 20px; background:rgba(255,255,255,0.03); border:1px solid #2a2a3a; border-radius:6px; margin-bottom:24px; }
.register-row-text { font-size:14px; color:#ccc; }
.register-row-btn { padding:8px 16px; border:1px solid #fff; background:none; color:#fff; border-radius:4px; font-size:13px; font-weight:500; cursor:pointer; text-decoration:none; }
.register-row-btn:hover { background:rgba(255,255,255,0.08); }

.divider-text { text-align:center; font-size:14px; font-weight:600; color:#fff; letter-spacing:2px; margin-bottom:20px; position:relative; }
.divider-text::before, .divider-text::after { content:''; position:absolute; top:50%; width:30%; height:1px; background:#2a2a3a; }
.divider-text::before { left:0; }
.divider-text::after { right:0; }

.form-group { margin-bottom:12px; }
.form-input { width:100%; background:#1a1e2e; border:1px solid #2a2e3e; color:#fff; border-radius:4px; padding:14px; font-size:14px; font-family:'Inter',sans-serif; outline:none; }
.form-input:focus { border-color:#e8a23d; }
.form-input::placeholder { color:#666; }

.btn-login { width:100%; display:flex; align-items:center; justify-content:center; gap:8px; padding:14px; background:#e8a23d; color:#000; border:none; border-radius:4px; font-size:15px; font-weight:600; cursor:pointer; font-family:'Inter',sans-serif; margin-top:4px; }
.btn-login:hover { background:#d4922f; }
.btn-login:disabled { opacity:0.5; cursor:default; }

.btn-forgot { width:100%; padding:12px; background:rgba(255,255,255,0.06); color:#ccc; border:none; border-radius:4px; font-size:13px; cursor:pointer; margin-top:8px; font-family:'Inter',sans-serif; }
.btn-forgot:hover { background:rgba(255,255,255,0.1); color:#fff; }

.toast { position:fixed; top:20px; left:50%; transform:translateX(-50%); padding:10px 20px; border-radius:8px; font-size:13px; z-index:999; background:#1a1a2e; color:#fff; border:1px solid #333; }
.toast.error { border-color:#e53935; color:#e53935; }

@media(max-width:480px) {
  .topbar { padding:12px 16px; }
  .topbar-brand { font-size:20px; }
  .login-shell { margin:30px auto; }
}
</style>
</head>
<body>

<div class="topbar">
  <a href="/" class="topbar-brand"><img src="/img/icon-orange.png" alt="HudBroker" style="height:48px;"></a>
  <div class="topbar-nav">
    <a href="/login" class="topbar-btn-enter">Entrar</a>
    <a href="/register" class="topbar-btn-create">Criar Conta</a>
  </div>
</div>

<div class="login-shell">
  <div class="register-row">
    <span class="register-row-text">Nao possui uma conta?</span>
    <a href="/register" class="register-row-btn">Abra agora</a>
  </div>

  <div class="divider-text">ACESSE SUA CONTA</div>

  <form id="loginForm">
    <div class="form-group">
      <input type="email" class="form-input" id="loginEmail" placeholder="E-mail" required>
    </div>
    <div class="form-group">
      <input type="password" class="form-input" id="loginPassword" placeholder="Senha" required>
    </div>
    <button type="submit" class="btn-login" id="btnLogin">&#10004; Acessar</button>
    <button type="button" class="btn-forgot" onclick="showForgotModal()">Esqueci minha senha</button>
    <div id="forgotModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;align-items:center;justify-content:center;">
      <div style="background:#10142a;border:1px solid #1c2040;border-radius:10px;padding:28px;width:360px;max-width:90vw;">
        <div style="font-size:18px;font-weight:700;color:#fff;margin-bottom:6px;">Esqueci minha senha</div>
        <div style="font-size:13px;color:#888;margin-bottom:16px;">Digite seu email e enviaremos uma senha temporária.</div>
        <input type="email" id="forgotEmail" placeholder="Seu email" style="width:100%;background:#0a0e17;border:1px solid #1c2040;color:#fff;border-radius:6px;padding:11px;font-size:14px;margin-bottom:12px;">
        <button onclick="sendForgot()" id="forgotBtn" style="width:100%;padding:12px;background:#e8a23d;color:#000;border:none;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;">Enviar</button>
        <div id="forgotMsg" style="font-size:12px;margin-top:10px;display:none;"></div>
        <button onclick="document.getElementById('forgotModal').style.display='none'" style="width:100%;padding:10px;background:none;border:1px solid #1c2040;color:#888;border-radius:6px;font-size:13px;cursor:pointer;margin-top:8px;">Cancelar</button>
      </div>
    </div>
  </form>
</div>

<script src="/js/api.js">
function showForgotModal() {
  document.getElementById('forgotModal').style.display = 'flex';
  document.getElementById('forgotEmail').value = '';
  document.getElementById('forgotMsg').style.display = 'none';
}
async function sendForgot() {
  var email = document.getElementById('forgotEmail').value;
  if (!email) { return; }
  var btn = document.getElementById('forgotBtn');
  var msg = document.getElementById('forgotMsg');
  btn.disabled = true; btn.textContent = 'Enviando...';
  try {
    var res = await fetch('/api/auth/forgot-password', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:email})});
    var data = await res.json();
    if (!res.ok) throw new Error(data.error);
    msg.style.display = 'block'; msg.style.color = '#08c58a';
    msg.textContent = 'Senha temporária enviada para seu email!';
    setTimeout(function(){ document.getElementById('forgotModal').style.display='none'; }, 3000);
  } catch(e) {
    msg.style.display = 'block'; msg.style.color = '#fc4b4a';
    msg.textContent = e.message || 'Erro ao enviar';
  } finally { btn.disabled = false; btn.textContent = 'Enviar'; }
}
</script>
<script>
(async function() {
  var params = new URLSearchParams(location.search);
  var ref = params.get('ref');
  if (ref && !localStorage.getItem('hb_click_id')) {
    try {
      var result = await apiFetch('/affiliates/track', { method: 'POST', body: JSON.stringify({ refCode: ref }) });
      localStorage.setItem('hb_click_id', result.clickId);
    } catch(e) {}
  }
})();

document.getElementById('loginForm').onsubmit = async function(e) {
  e.preventDefault();
  var btn = document.getElementById('btnLogin');
  var email = document.getElementById('loginEmail').value.trim();
  var password = document.getElementById('loginPassword').value;

  btn.disabled = true;
  btn.innerHTML = 'Entrando...';

  try {
    var data = await apiFetch('/auth/login', {
      method: 'POST',
      body: JSON.stringify({ email: email, password: password })
    });
    setToken(data.token);
    window.location.href = '/trade';
  } catch(err) {
    showToast(err.message || 'Email ou senha incorretos', 'error');
    btn.disabled = false;
    btn.innerHTML = '&#10004; Acessar';
  }
};

function showForgotModal() {
  document.getElementById('forgotModal').style.display = 'flex';
  document.getElementById('forgotEmail').value = '';
  document.getElementById('forgotMsg').style.display = 'none';
}
async function sendForgot() {
  var email = document.getElementById('forgotEmail').value;
  if (!email) { return; }
  var btn = document.getElementById('forgotBtn');
  var msg = document.getElementById('forgotMsg');
  btn.disabled = true; btn.textContent = 'Enviando...';
  try {
    var res = await fetch('/api/auth/forgot-password', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:email})});
    var data = await res.json();
    if (!res.ok) throw new Error(data.error);
    msg.style.display = 'block'; msg.style.color = '#08c58a';
    msg.textContent = 'Senha temporária enviada para seu email!';
    setTimeout(function(){ document.getElementById('forgotModal').style.display='none'; }, 3000);
  } catch(e) {
    msg.style.display = 'block'; msg.style.color = '#fc4b4a';
    msg.textContent = e.message || 'Erro ao enviar';
  } finally { btn.disabled = false; btn.textContent = 'Enviar'; }
}
</script>
</body>
</html>
