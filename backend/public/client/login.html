<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HudBroker — Entrar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/shared.css">
</head>
<body>
<div class="auth-shell">
  <div class="auth-card">
    <div class="brand" style="margin-bottom: 24px;"><span class="dot"></span>Hud<span class="tag">Broker</span></div>

    <div id="loginView">
      <h1>Entrar</h1>
      <div class="sub">Acesse sua conta para operar</div>
      <form id="loginForm">
        <div class="field">
          <label>Email</label>
          <input type="email" id="loginEmail" required>
        </div>
        <div class="field">
          <label>Senha</label>
          <input type="password" id="loginPassword" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; padding: 12px;">Entrar</button>
      </form>
      <p style="margin-top: 16px; font-size: 13px; color: var(--text-faint);">
        Não tem conta? <a href="#" id="goRegister" style="color: var(--brand);">Cadastre-se</a>
      </p>
    </div>

    <div id="registerView" style="display:none;">
      <h1>Criar conta</h1>
      <div class="sub">Comece a operar com saldo demo de $10.000</div>
      <form id="registerForm">
        <div class="field">
          <label>Nome</label>
          <input type="text" id="regName" required>
        </div>
        <div class="field">
          <label>Email</label>
          <input type="email" id="regEmail" required>
        </div>
        <div class="field">
          <label>Senha</label>
          <input type="password" id="regPassword" required minlength="6">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; padding: 12px;">Criar conta</button>
      </form>
      <p style="margin-top: 16px; font-size: 13px; color: var(--text-faint);">
        Já tem conta? <a href="#" id="goLogin" style="color: var(--brand);">Entrar</a>
      </p>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script>
// Captura o clique de afiliado, se o usuário chegou via link ?ref=CODIGO
(async () => {
  const params = new URLSearchParams(location.search);
  const ref = params.get('ref');
  if (ref && !localStorage.getItem('hb_click_id')) {
    try {
      const result = await apiFetch('/affiliates/track', { method: 'POST', body: JSON.stringify({ refCode: ref }) });
      localStorage.setItem('hb_click_id', result.clickId);
    } catch (err) { /* código de afiliado inválido, ignora silenciosamente */ }
  }
})();
</script>

<script>
document.getElementById('goRegister').onclick = (e) => {
  e.preventDefault();
  document.getElementById('loginView').style.display = 'none';
  document.getElementById('registerView').style.display = 'block';
};
document.getElementById('goLogin').onclick = (e) => {
  e.preventDefault();
  document.getElementById('registerView').style.display = 'none';
  document.getElementById('loginView').style.display = 'block';
};

document.getElementById('loginForm').onsubmit = async (e) => {
  e.preventDefault();
  try {
    const data = await apiFetch('/auth/login', {
      method: 'POST',
      body: JSON.stringify({
        email: document.getElementById('loginEmail').value,
        password: document.getElementById('loginPassword').value
      })
    });
    setToken(data.token);
    window.location.href = '/client/index.html';
  } catch (err) {
    showToast(err.message, 'error');
  }
};

document.getElementById('registerForm').onsubmit = async (e) => {
  e.preventDefault();
  try {
    // Recupera click_id salvo pelo link de afiliado, se existir
    const clickId = localStorage.getItem('hb_click_id') || null;
    const data = await apiFetch('/auth/register', {
      method: 'POST',
      body: JSON.stringify({
        name: document.getElementById('regName').value,
        email: document.getElementById('regEmail').value,
        password: document.getElementById('regPassword').value,
        clickId
      })
    });
    setToken(data.token);
    window.location.href = '/client/index.html';
  } catch (err) {
    showToast(err.message, 'error');
  }
};
</script>
</body>
</html>
