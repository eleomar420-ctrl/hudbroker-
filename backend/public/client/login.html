<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HudBroker — Entrar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/shared.css">
<style>
.country-row { display: flex; align-items: center; gap: 8px; background: var(--bg-elevated); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; }
.country-flag { font-size: 18px; }
.phone-row { display: flex; gap: 8px; }
.phone-code { width: 70px; flex-shrink: 0; text-align: center; }
.checkbox-row { display: flex; align-items: flex-start; gap: 10px; margin: 16px 0; font-size: 13px; color: var(--text-dim); }
.checkbox-row input { width: auto; margin-top: 2px; }
.checkbox-row a { color: var(--brand); }
.auth-card.wide { width: 420px; }
</style>
</head>
<body>
<div class="auth-shell">
  <div class="auth-card wide">
    <div class="brand" style="margin-bottom: 24px;"><span class="dot"></span>Hud<span class="tag">Broker</span></div>

    <div id="loginView">
      <h1>Entrar</h1>
      <div class="sub">Acesse sua conta para operar</div>
      <form id="loginForm">
        <div class="field">
          <label>Email</label>
          <input type="email" id="loginEmail" required>
        </div>
        <div class="field">
          <label>Senha</label>
          <input type="password" id="loginPassword" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; padding: 12px;">Entrar</button>
      </form>
      <p style="margin-top: 16px; font-size: 13px; color: var(--text-faint);">
        Não tem conta? <a href="#" id="goRegister" style="color: var(--brand);">Cadastre-se</a>
      </p>
    </div>

    <div id="registerView" style="display:none;">
      <h1>Criar conta</h1>
      <div class="sub">Comece a operar com saldo demo de R$ 10.000</div>
      <form id="registerForm">
        <div class="field">
          <label>País</label>
          <div class="country-row">
            <span class="country-flag">🇧🇷</span>
            <span>Brasil</span>
          </div>
        </div>
        <div class="field">
          <label>Nome</label>
          <input type="text" id="regName" required>
        </div>
        <div class="field">
          <label>Sobrenome</label>
          <input type="text" id="regLastName" required>
        </div>
        <div class="field">
          <label>E-mail</label>
          <input type="email" id="regEmail" required>
        </div>
        <div class="field">
          <label>Telefone</label>
          <div class="phone-row">
            <input type="text" class="phone-code" value="+55" disabled>
            <input type="tel" id="regPhone" placeholder="DDD + número" required style="flex:1;">
          </div>
        </div>
        <div class="field">
          <label>Moeda da conta</label>
          <div class="country-row">
            <span class="country-flag">🇧🇷</span>
            <span>Real Brasileiro (BRL)</span>
          </div>
        </div>
        <div class="field">
          <label>Senha</label>
          <input type="password" id="regPassword" required minlength="6">
        </div>
        <div class="checkbox-row">
          <input type="checkbox" id="regTerms" required>
          <label for="regTerms" style="margin:0; color: var(--text-dim);">
            Confirmo que tenho 18 anos ou mais, e concordo com os <a href="#">Termos de Uso</a>.
          </label>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; padding: 12px;">Criar conta</button>
      </form>
      <p style="margin-top: 16px; font-size: 13px; color: var(--text-faint);">
        Já tem conta? <a href="#" id="goLogin" style="color: var(--brand);">Entrar</a>
      </p>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script>
(async () => {
  const params = new URLSearchParams(location.search);
  const ref = params.get('ref');
  if (ref && !localStorage.getItem('hb_click_id')) {
    try {
      const result = await apiFetch('/affiliates/track', { method: 'POST', body: JSON.stringify({ refCode: ref }) });
      localStorage.setItem('hb_click_id', result.clickId);
    } catch (err) { }
  }
})();
</script>

<script>
document.getElementById('goRegister').onclick = (e) => {
  e.preventDefault();
  document.getElementById('loginView').style.display = 'none';
  document.getElementById('registerView').style.display = 'block';
};
document.getElementById('goLogin').onclick = (e) => {
  e.preventDefault();
  document.getElementById('registerView').style.display = 'none';
  document.getElementById('loginView').style.display = 'block';
};

document.getElementById('loginForm').onsubmit = async (e) => {
  e.preventDefault();
  try {
    const data = await apiFetch('/auth/login', {
      method: 'POST',
      body: JSON.stringify({
        email: document.getElementById('loginEmail').value,
        password: document.getElementById('loginPassword').value
      })
    });
    setToken(data.token);
    window.location.href = '/client/index.html';
  } catch (err) {
    showToast(err.message, 'error');
  }
};

document.getElementById('registerForm').onsubmit = async (e) => {
  e.preventDefault();
  try {
    const clickId = localStorage.getItem('hb_click_id') || null;
    const data = await apiFetch('/auth/register', {
      method: 'POST',
      body: JSON.stringify({
        name: document.getElementById('regName').value,
        lastName: document.getElementById('regLastName').value,
        email: document.getElementById('regEmail').value,
        phone: '+55' + document.getElementById('regPhone').value,
        country: 'BR',
        password: document.getElementById('regPassword').value,
        clickId
      })
    });
    setToken(data.token);
    window.location.href = '/client/index.html';
  } catch (err) {
    showToast(err.message, 'error');
  }
};
</script>
</body>
</html>
