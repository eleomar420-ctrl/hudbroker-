<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HudBroker — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/shared.css">
</head>
<body>
<div class="auth-shell">
  <div class="auth-card">
    <div class="brand" style="margin-bottom: 24px;"><span class="dot"></span>Hud<span class="tag">Broker</span><span style="color:var(--text-faint); font-size: 13px; margin-left: 6px;">/ admin</span></div>
    <h1>Painel administrativo</h1>
    <div class="sub">Acesso restrito</div>
    <form id="loginForm">
      <div class="field">
        <label>Email</label>
        <input type="email" id="email" required value="admin@hudbroker.com">
      </div>
      <div class="field">
        <label>Senha</label>
        <input type="password" id="password" required value="admin123">
      </div>
      <button type="submit" class="btn btn-primary" style="width: 100%; padding: 12px;">Entrar</button>
    </form>
  </div>
</div>
<script src="/js/api.js"></script>
<script>
document.getElementById('loginForm').onsubmit = async (e) => {
  e.preventDefault();
  try {
    const data = await apiFetch('/auth/login', {
      method: 'POST',
      body: JSON.stringify({ email: document.getElementById('email').value, password: document.getElementById('password').value })
    });
    if (data.user.role !== 'admin') throw new Error('Esta conta não tem acesso administrativo');
    setToken(data.token);
    window.location.href = '/admin/index.html';
  } catch (err) {
    showToast(err.message, 'error');
  }
};
</script>
</body>
</html>
