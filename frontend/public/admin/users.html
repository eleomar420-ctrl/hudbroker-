<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HudBroker — Usuários</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/shared.css">
</head>
<body>
<div class="topbar">
  <div class="brand"><span class="dot"></span>Hud<span class="tag">Broker</span><span style="color:var(--text-faint); font-size: 13px; margin-left: 6px;">/ admin</span></div>
  <div class="topbar-right"><button class="btn" id="logoutBtn">Sair</button></div>
</div>

<div class="layout">
  <div class="sidebar">
    <a href="/admin/index.html">Visão geral</a>
    <a href="/admin/users.html" class="active">Usuários</a>
    <a href="/admin/trades.html">Operações</a>
    <a href="/admin/affiliates.html">Afiliados</a>
  </div>

  <div class="main">
    <div class="card">
      <div class="card-title">Usuários</div>
      <table>
        <thead>
          <tr><th>Nome</th><th>Email</th><th>Saldo</th><th>KYC</th><th>Status</th><th>Ações</th></tr>
        </thead>
        <tbody id="usersBody"><tr><td colspan="6" class="empty-state">Carregando...</td></tr></tbody>
      </table>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script>
requireAuth('/admin/login.html');

async function load() {
  const users = await apiFetch('/admin/users');
  const tbody = document.getElementById('usersBody');
  if (users.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6" class="empty-state">Nenhum usuário cadastrado</td></tr>';
    return;
  }
  tbody.innerHTML = users.map(u => `
    <tr>
      <td>${u.name}</td>
      <td>${u.email}</td>
      <td>${formatMoney(u.balance)}</td>
      <td><span class="badge ${u.kyc_status === 'approved' ? 'badge-up' : 'badge-pending'}">${u.kyc_status}</span></td>
      <td><span class="badge ${u.status === 'active' ? 'badge-up' : 'badge-down'}">${u.status}</span></td>
      <td>
        <button class="btn" style="padding: 4px 10px; font-size: 12px;" onclick="approveKyc('${u.id}')">Aprovar KYC</button>
        <button class="btn" style="padding: 4px 10px; font-size: 12px;" onclick="toggleStatus('${u.id}', '${u.status}')">${u.status === 'active' ? 'Suspender' : 'Reativar'}</button>
      </td>
    </tr>
  `).join('');
}

async function approveKyc(id) {
  await apiFetch(`/admin/users/${id}/kyc`, { method: 'PATCH', body: JSON.stringify({ kyc_status: 'approved' }) });
  showToast('KYC aprovado');
  load();
}

async function toggleStatus(id, current) {
  const newStatus = current === 'active' ? 'suspended' : 'active';
  await apiFetch(`/admin/users/${id}/status`, { method: 'PATCH', body: JSON.stringify({ status: newStatus }) });
  showToast('Status atualizado');
  load();
}

document.getElementById('logoutBtn').onclick = () => logout('/admin/login.html');
load();
</script>
</body>
</html>
