<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HudBroker — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/shared.css">
</head>
<body>
<div class="topbar">
  <div class="brand"><span class="dot"></span>Hud<span class="tag">Broker</span><span style="color:var(--text-faint); font-size: 13px; margin-left: 6px;">/ admin</span></div>
  <div class="topbar-right"><button class="btn" id="logoutBtn">Sair</button></div>
</div>

<div class="layout">
  <div class="sidebar">
    <a href="/admin/index.html" class="active">Visão geral</a>
    <a href="/admin/users.html">Usuários</a>
    <a href="/admin/trades.html">Operações</a>
    <a href="/admin/affiliates.html">Afiliados</a>
  </div>

  <div class="main">
    <div class="grid-3" style="margin-bottom: 16px;">
      <div class="card">
        <div class="stat-label">Usuários cadastrados</div>
        <div class="stat-value" id="statUsers">--</div>
      </div>
      <div class="card">
        <div class="stat-label">Total de depósitos</div>
        <div class="stat-value" id="statDeposits">--</div>
      </div>
      <div class="card">
        <div class="stat-label">Resultado da casa</div>
        <div class="stat-value" id="statHouse">--</div>
      </div>
    </div>
    <div class="grid-3">
      <div class="card">
        <div class="stat-label">Operações totais</div>
        <div class="stat-value" id="statTrades">--</div>
      </div>
      <div class="card">
        <div class="stat-label">Operações em andamento</div>
        <div class="stat-value" id="statOpen">--</div>
      </div>
      <div class="card"></div>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script>
requireAuth('/admin/login.html');

async function load() {
  const data = await apiFetch('/admin/overview');
  document.getElementById('statUsers').textContent = data.totalUsers;
  document.getElementById('statDeposits').textContent = formatMoney(data.totalDeposits);
  document.getElementById('statHouse').textContent = formatMoney(data.houseResult);
  document.getElementById('statHouse').className = 'stat-value ' + (data.houseResult >= 0 ? 'up' : 'down');
  document.getElementById('statTrades').textContent = data.totalTrades;
  document.getElementById('statOpen').textContent = data.openTrades;
}

document.getElementById('logoutBtn').onclick = () => logout('/admin/login.html');
load();
</script>
</body>
</html>
